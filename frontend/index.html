<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Municipal Tracker – Login</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <span>🏙️</span>
      <h1>Smart Municipal Tracker</h1>
      <p>GPS-based Attendance &amp; Work Tracking</p>
    </div>

    <div id="login-alert"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" class="form-control" type="text"
               placeholder="admin / worker1" required autocomplete="username"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" class="form-control" type="password"
               placeholder="admin123 / worker123" required autocomplete="current-password"/>
      </div>
      <button id="btn-login" class="btn btn-primary" style="width:100%;justify-content:center" type="submit">
        🔐 Sign In
      </button>
    </form>

    <p style="margin-top:1.2rem;text-align:center;font-size:.82rem;color:var(--muted)">
      Demo: admin / admin123 &nbsp;|&nbsp; worker1 / worker123
    </p>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
  // Redirect if already logged in
  (function() {
    if (Auth.isLoggedIn()) {
      const user = Auth.getUser();
      window.location.href = user?.role === "admin" ? "admin.html" : "worker.html";
    }
  })();

  document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("btn-login");
    btn.disabled = true;
    btn.textContent = "Signing in…";
    try {
      const data = await Auth.login(
        document.getElementById("username").value,
        document.getElementById("password").value
      );
      window.location.href = data.role === "admin" ? "admin.html" : "worker.html";
    } catch (err) {
      showAlert("login-alert", err.message, "danger");
      btn.disabled = false;
      btn.textContent = "🔐 Sign In";
    }
  });
</script>
</body>
</html>
